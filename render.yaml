services:
  - type: web
    name: quorum-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://quorum-backend-1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
