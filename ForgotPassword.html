<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password</title>
    <link rel="stylesheet" href="css/ForgotPassword.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="container">
        <h1>Reset Your <br> Password</h1>
        <p>Forgot password, Reset now to continue <br>voting</p>
        <div class="success-msg" id="successMsg">
            ✅ Password reset successfully! Redirecting to login...
        </div>

        <div class="error-msg" id="errorMsg">
            ❌ Passwords do not match. Please try again.
        </div>
        <div class="form">
            <form action="#">
                
                <div class="password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 14h.01" />
                    <path d="M6.5 10.5c1.9-1.9 5.1-1.9 7 0" />
                    <path d="M3 7a10 10 0 0 1 14 0" />
                    <rect x="14" y="15" width="6" height="5" rx="1" />
                    <path d="M15 15v-2a2 2 0 0 1 4 0v2" />
                    </svg>
                    <input type="password" id="password" placeholder="Enter new password" >
                    <span id="togglePassword">👁</span> 
                </div>
                <div class="strength" id="result"></div>

                <div class="password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 14h.01" />
                    <path d="M6.5 10.5c1.9-1.9 5.1-1.9 7 0" />
                    <path d="M3 7a10 10 0 0 1 14 0" />
                    <rect x="14" y="15" width="6" height="5" rx="1" />
                    <path d="M15 15v-2a2 2 0 0 1 4 0v2" />
                    </svg>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" >
                    <span id="toggleConfirmPassword">👁</span>
                </div>
                <p class="you">You will receive an email to complete your password reset in your registered email account</p>
                
                <button id="continueBtn" type="button" disabled onclick="resetPassword()">Continue</button>
                <button class="login" type="button" onclick="window.location.href='SignIn.html'">Back to Log In</button>
            
            </form>
        </div>
    </div>






    <script src="JS/ForgotPassword.js" ></script>
</body>
</html>
